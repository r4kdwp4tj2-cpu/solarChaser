name: Engineering change
description: Propose a controlled change to requirements, architecture, interfaces, or implementation.
title: "[CHANGE] "
labels: ["engineering-change"]
body:
  - type: textarea
    id: need
    attributes:
      label: Need and intended outcome
      description: Explain the problem or opportunity without prescribing a solution unnecessarily.
    validations:
      required: true
  - type: textarea
    id: impacts
    attributes:
      label: Known impacts
      description: List affected requirements, systems, interfaces, decisions, risks, verification, weight, cost, and documentation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and trade-offs
      description: Include doing nothing where relevant.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance and verification
      description: State how the change will be judged complete.
    validations:
      required: true
